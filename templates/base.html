<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Кудінов Кирило — Junior Web Dev{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    
    <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>


<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand" href="/">
            <span class="brand-bracket">[</span>
            <span class="brand-name">KK</span>
            <span class="brand-bracket">]</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                        <i class="bi bi-person-lines-fill me-1"></i>About
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'projects' %}active{% endif %}" href="/projects">
                        <i class="bi bi-code-slash me-1"></i>Projects
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}" href="/contact">
                        <i class="bi bi-send me-1"></i>Contact
                    </a>
                </li>
            </ul>
            <button id="themeToggle" class="btn btn-theme-toggle ms-2" title="Змінити тему" aria-label="Toggle theme">
                <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
            </button>
            <a href="https://github.com/RobotKava345" target="_blank" class="btn btn-outline-accent ms-2">
                <i class="bi bi-github me-1"></i>GitHub
            </a>
        </div>
    </div>
</nav>


<main>
    {% block content %}{% endblock %}
</main>


<footer>
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <p class="footer-text mb-0">
                    <span class="text-accent">// </span>Кудінов Кирило &copy; 2025
                </p>
            </div>
            <div class="col-md-6 text-md-end mt-2 mt-md-0">
                <a href="https://github.com/RobotKava345" target="_blank" class="footer-link me-3">
                    <i class="bi bi-github"></i>
                </a>
                <a href="https://t.me/gg_nn_kiri" target="_blank" class="footer-link me-3">
                    <i class="bi bi-telegram"></i>
                </a>
                <a href="tel:+380509919424" class="footer-link">
                    <i class="bi bi-telephone"></i>
                </a>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
